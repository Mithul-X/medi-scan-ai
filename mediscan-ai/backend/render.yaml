services:
  - type: web
    name: mediscan-ai-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./mediscan.db
      - key: MAX_SESSIONS_HISTORY
        value: "3"
      - key: MAX_ANALYSES_PER_SESSION
        value: "3"
      - key: LOG_LEVEL
        value: INFO
